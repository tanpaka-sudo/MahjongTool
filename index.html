<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🀄 麻雀 点数計算</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: linear-gradient(160deg, #0d0d1a, #1a1035, #0d1a2a); min-height: 100vh; font-family: -apple-system, 'Noto Sans JP', sans-serif; color: #fff; }
button { -webkit-tap-highlight-color: transparent; cursor: pointer; font-family: inherit; }
input { -webkit-tap-highlight-color: transparent; font-family: inherit; }
input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; }
input[type=number] { -moz-appearance: textfield; }
@keyframes ep { 0%,100%{opacity:1} 50%{opacity:.4} }
.ep { animation: ep 1.8s ease infinite; }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.fade-in { animation: fadeIn 0.2s ease forwards; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
details summary { list-style: none; }
details summary::-webkit-details-marker { display: none; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo } = React;

// ── 定数 ──────────────────────────────────────
const PC = [
  { bg:"#1a4a8a", accent:"#60a5fa", dim:"rgba(96,165,250,0.18)",  border:"rgba(96,165,250,0.45)"  },
  { bg:"#8a1a1a", accent:"#f87171", dim:"rgba(248,113,113,0.18)", border:"rgba(248,113,113,0.45)" },
  { bg:"#4a1a8a", accent:"#c084fc", dim:"rgba(192,132,252,0.18)", border:"rgba(192,132,252,0.45)" },
  { bg:"#1a6a3a", accent:"#4ade80", dim:"rgba(74,222,128,0.18)",  border:"rgba(74,222,128,0.45)"  },
];
const RANK_EMOJI = ["🥇","🥈","🥉","4️⃣"];

const DEF_SETTINGS = {
  3: { initial:35000, kaeshi:35000, uma:[20,0,-20] },
  4: { initial:25000, kaeshi:30000, uma:[20,10,-10,-20] },
};
const DEF_PLAYERS = {
  3: ["プレイヤー1","プレイヤー2","プレイヤー3"],
  4: ["プレイヤー1","プレイヤー2","プレイヤー3","プレイヤー4"],
};

const STORAGE_KEY = "mahjong_v1";
const mkRounds = (n) => Array.from({length:10}, ()=>Array(n).fill(""));

// ── ユーティリティ ────────────────────────────
function norm(s) {
  if (s===""||s==null) return null;
  const n=Number(s); return n<1000?n*1000:n;
}
function fmt(n) {
  if (n==null) return "—";
  return (n>0?"+":"")+n;
}
function calcRound(scores, kaeshi, uma, initial) {
  const n = scores.length;
  const parsed = scores.map(norm);
  if (parsed.some(v=>v===null)) return null;
  const raw = parsed.map(s=>Math.round((s-kaeshi)/1000));
  const sorted = [...raw].sort((a,b)=>b-a);
  const ranks = raw.map(r=>sorted.indexOf(r));
  const surplus = Math.round(((kaeshi-initial)*n)/1000);
  const final = raw.map((r,i)=>r+uma[ranks[i]]+(ranks[i]===0?surplus:0));
  return {raw, final, ranks};
}
function tryAutoFill(r, initial) {
  const n = r.length;
  const empties = r.map((v,i)=>v===""?i:-1).filter(i=>i!==-1);
  if (empties.length !== 1) return r;
  const filledSum = r.filter(v=>v!=="").reduce((s,v)=>s+(norm(v)||0), 0);
  const newR = [...r];
  newR[empties[0]] = String(initial*n - filledSum);
  return newR;
}
function formatDate(ts) {
  const d=new Date(ts);
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,"0")}/${String(d.getDate()).padStart(2,"0")} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
}
function loadData() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}"); } catch { return {}; }
}
function saveData(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

// ── メインアプリ ──────────────────────────────
function App() {
  const stored = loadData();
  const [tab, setTab]             = useState("input");
  const [numPlayers, setNumPlayers] = useState(stored.numPlayers||3);
  const [players, setPlayers]     = useState(stored.players||DEF_PLAYERS[3]);
  const [settings, setSettings]   = useState(stored.settings||DEF_SETTINGS[3]);
  const [rounds, setRounds]       = useState(()=>mkRounds(stored.numPlayers||3));
  const [editingPlayer, setEditingPlayer] = useState(null);
  const [editingName, setEditingName]     = useState("");
  const [showSettings, setShowSettings]   = useState(false);
  const [sessions, setSessions]   = useState(()=>loadData().sessions||[]);

  useEffect(()=>{ saveData({sessions, numPlayers, players, settings}); }, [sessions, numPlayers, players, settings]);

  // 人数切り替え
  const switchMode = (n) => {
    if (rounds.some(r=>r.some(v=>v!==""))) {
      if (!confirm("入力中のデータがリセットされます。よろしいですか？")) return;
    }
    setNumPlayers(n);
    setPlayers(DEF_PLAYERS[n]);
    setSettings(DEF_SETTINGS[n]);
    setRounds(mkRounds(n));
  };

  const pRange = Array.from({length:numPlayers},(_,i)=>i);

  const results = rounds.map(r=>calcRound(r, settings.kaeshi, settings.uma, settings.initial));
  const totals  = pRange.map(pi=>{
    const vals=results.filter(Boolean).map(r=>r.final[pi]);
    return vals.length>0 ? vals.reduce((a,b)=>a+b,0) : null;
  });
  const finalRanks = totals.some(t=>t!==null)
    ? totals.map(t=>t===null?null:[...totals].filter(x=>x!==null).sort((a,b)=>b-a).indexOf(t))
    : null;

  const updateRound = (ri,pi,val) => {
    setRounds(prev=>prev.map((r,i)=>{
      if(i!==ri) return r;
      const newR=[...r]; newR[pi]=val; return newR;
    }));
  };
  const blurRound = (ri,pi) => {
    setRounds(prev=>prev.map((r,i)=>{
      if(i!==ri) return r;
      const newR=[...r];
      if(newR[pi]!==""&&Number(newR[pi])<1000) newR[pi]=String(Number(newR[pi])*1000);
      return tryAutoFill(newR, settings.initial);
    }));
  };

  const saveSession = () => {
    const completedRounds = results.map((res,ri)=>res?{
      scores: rounds[ri].map(s=>norm(s)),
      raw: res.raw, final: res.final, ranks: res.ranks,
    }:null).filter(Boolean);
    if(completedRounds.length===0){ alert("入力された局がありません"); return; }
    const sessionTotals = pRange.map(pi=>completedRounds.reduce((s,r)=>s+r.final[pi],0));
    const sessionRanks  = pRange.map(pi=>[...sessionTotals].sort((a,b)=>b-a).indexOf(sessionTotals[pi]));
    setSessions(prev=>[{
      id: Date.now(), date: Date.now(),
      numPlayers, players:[...players], settings:{...settings},
      rounds: completedRounds, totals: sessionTotals, ranks: sessionRanks,
    },...prev]);
    setRounds(mkRounds(numPlayers));
    setTab("history");
  };

  const deleteSession = (id) => {
    if(confirm("この半荘の記録を削除しますか？"))
      setSessions(prev=>prev.filter(s=>s.id!==id));
  };

  const surplus = Math.round(((settings.kaeshi-settings.initial)*numPlayers)/1000);

  return (
    <div style={{minHeight:"100vh",paddingBottom:70}}>

      {/* ヘッダー */}
      <div style={{background:"rgba(0,0,0,0.5)",borderBottom:"1px solid rgba(255,255,255,0.07)",padding:"11px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:17,fontWeight:900,letterSpacing:1}}>🀄 麻雀点数計算</span>
          {/* 3人/4人切り替え */}
          <div style={{display:"flex",background:"rgba(255,255,255,0.08)",borderRadius:20,padding:2,gap:2}}>
            {[3,4].map(n=>(
              <button key={n} onClick={()=>switchMode(n)} style={{padding:"3px 10px",borderRadius:18,border:"none",fontSize:12,fontWeight:700,background:numPlayers===n?"rgba(139,92,246,0.7)":"transparent",color:numPlayers===n?"#fff":"rgba(255,255,255,0.45)"}}>
                {n}人
              </button>
            ))}
          </div>
        </div>
        {tab==="input" && (
          <div style={{display:"flex",gap:6}}>
            <button onClick={()=>setShowSettings(s=>!s)} style={{background:showSettings?"rgba(139,92,246,0.35)":"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.15)",color:"#fff",borderRadius:20,padding:"5px 12px",fontSize:13}}>⚙️</button>
            <button onClick={()=>{if(confirm("リセットしますか？"))setRounds(mkRounds(numPlayers));}} style={{background:"rgba(239,68,68,0.15)",border:"1px solid rgba(239,68,68,0.3)",color:"#fca5a5",borderRadius:20,padding:"5px 12px",fontSize:13}}>🔄</button>
          </div>
        )}
      </div>

      {/* タブ */}
      <div style={{display:"flex",background:"rgba(0,0,0,0.3)",borderBottom:"1px solid rgba(255,255,255,0.07)"}}>
        {[["input","📝 入力"],["history","📋 履歴"],["stats","📊 成績"]].map(([key,label])=>(
          <button key={key} onClick={()=>setTab(key)} style={{flex:1,padding:"10px 0",fontSize:13,fontWeight:tab===key?700:400,color:tab===key?"#c084fc":"rgba(255,255,255,0.45)",background:"transparent",border:"none",borderBottom:tab===key?"2px solid #c084fc":"2px solid transparent"}}>
            {label}
          </button>
        ))}
      </div>

      {/* ── 入力タブ ── */}
      {tab==="input" && (
        <div style={{padding:"10px 8px 0"}} className="fade-in">

          {/* 設定パネル */}
          {showSettings && (
            <div style={{marginBottom:12,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:14,padding:14}}>
              <div style={{color:"rgba(255,255,255,0.5)",fontSize:11,marginBottom:10,fontWeight:700}}>基本設定（{numPlayers}人打ち）</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
                {[{label:"初期点数",key:"initial"},{label:"返し点",key:"kaeshi"}].map(({label,key})=>(
                  <div key={key}>
                    <div style={{color:"rgba(255,255,255,0.5)",fontSize:10,marginBottom:4}}>{label}</div>
                    <input type="number" inputMode="numeric" value={settings[key]}
                      onChange={e=>setSettings(s=>({...s,[key]:Number(e.target.value)}))}
                      style={{width:"100%",padding:"8px 6px",borderRadius:8,textAlign:"center",background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.15)",color:"#fff",fontSize:14,fontWeight:700,outline:"none"}}/>
                  </div>
                ))}
              </div>
              {surplus!==0 && <div style={{background:"rgba(234,179,8,0.1)",border:"1px solid rgba(234,179,8,0.3)",borderRadius:8,padding:"6px 10px",marginBottom:10,fontSize:11,color:"rgba(234,179,8,0.9)"}}>⚠️ 1位に <b>{surplus>0?"+":""}{surplus}点</b> 自動加算</div>}
              <div style={{color:"rgba(255,255,255,0.5)",fontSize:10,marginBottom:6,fontWeight:700}}>ウマ</div>
              <div style={{display:"grid",gridTemplateColumns:`repeat(${numPlayers},1fr)`,gap:6}}>
                {settings.uma.map((u,i)=>(
                  <div key={i}>
                    <div style={{color:PC[i].accent,fontSize:9,textAlign:"center",marginBottom:3}}>{i+1}位</div>
                    <input type="number" inputMode="numeric" value={u}
                      onChange={e=>{const next=[...settings.uma];next[i]=Number(e.target.value);setSettings(s=>({...s,uma:next}));}}
                      style={{width:"100%",padding:"8px 4px",borderRadius:8,textAlign:"center",background:PC[i].dim,border:`1px solid ${PC[i].border}`,color:PC[i].accent,fontSize:13,fontWeight:700,outline:"none"}}/>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* プレイヤーヘッダー */}
          <div style={{display:"grid",gridTemplateColumns:`20px repeat(${numPlayers},1fr)`,gap:4,marginBottom:3}}>
            <div/>
            {players.map((name,pi)=>(
              <div key={pi} onClick={()=>{setEditingPlayer(pi);setEditingName(name);}}
                style={{background:PC[pi].bg,borderRadius:8,padding:"6px 3px",textAlign:"center",cursor:"pointer"}}>
                {editingPlayer===pi
                  ?<input autoFocus value={editingName} onChange={e=>setEditingName(e.target.value)}
                      onBlur={()=>{setPlayers(p=>p.map((n,i)=>i===pi?(editingName.trim()||n):n));setEditingPlayer(null);}}
                      onKeyDown={e=>e.key==="Enter"&&e.target.blur()}
                      style={{background:"transparent",border:"none",borderBottom:"1px solid rgba(255,255,255,0.5)",color:"#fff",fontSize:10,fontWeight:700,textAlign:"center",width:"90%",outline:"none"}}/>
                  :<div style={{color:"#fff",fontSize:10,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{name}</div>}
              </div>
            ))}
          </div>

          {/* 列ラベル */}
          <div style={{display:"grid",gridTemplateColumns:`20px repeat(${numPlayers},1fr)`,gap:4,marginBottom:4}}>
            <div/>
            {pRange.map(pi=>(
              <div key={pi} style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:2}}>
                {["持ち点","素点","最終点"].map(h=><div key={h} style={{color:"rgba(255,255,255,0.28)",fontSize:8,textAlign:"center"}}>{h}</div>)}
              </div>
            ))}
          </div>

          {/* 局 */}
          {rounds.map((round,ri)=>{
            const res=results[ri];
            const allFilled=round.every(s=>s!=="");
            const scoreSum=allFilled?round.reduce((a,s)=>a+(norm(s)||0),0):null;
            const expectedSum=settings.initial*numPlayers;
            const diff=scoreSum!==null?scoreSum-expectedSum:null;
            const hasError=diff!==null&&diff!==0;
            return (
              <div key={ri} style={{marginBottom:4}}>
                <div style={{display:"grid",gridTemplateColumns:`20px repeat(${numPlayers},1fr)`,gap:4,padding:"3px 0",background:hasError?"rgba(239,68,68,0.05)":ri%2===0?"rgba(255,255,255,0.02)":"transparent",borderRadius:hasError?"8px 8px 0 0":6,border:hasError?"1px solid rgba(239,68,68,0.3)":"1px solid transparent",borderBottom:hasError?"none":undefined}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"center",color:hasError?"#f87171":"rgba(255,255,255,0.22)",fontSize:9,fontWeight:700}}>{hasError?"⚠️":ri+1}</div>
                  {pRange.map(pi=>{
                    const hasScore=round[pi]!=="";
                    const rawVal=res?res.raw[pi]:null;
                    const finalVal=res?res.final[pi]:null;
                    const isFirst=res&&res.ranks[pi]===0;
                    return (
                      <div key={pi} style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:2}}>
                        <input type="number" inputMode="numeric" placeholder="—" value={round[pi]}
                          onChange={e=>updateRound(ri,pi,e.target.value)}
                          onBlur={()=>blurRound(ri,pi)}
                          style={{height:30,padding:"0 1px",borderRadius:6,textAlign:"center",width:"100%",background:hasScore?PC[pi].dim:"rgba(255,255,255,0.05)",border:`1px solid ${hasScore?PC[pi].border:"rgba(255,255,255,0.08)"}`,color:hasScore?PC[pi].accent:"rgba(255,255,255,0.3)",fontSize:11,fontWeight:700,outline:"none"}}/>
                        <div style={{height:30,borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(255,255,255,0.03)",color:rawVal!==null?(rawVal>=0?"#86efac":"#fca5a5"):"rgba(255,255,255,0.15)",fontSize:10,fontWeight:600}}>{rawVal!==null?fmt(rawVal):"—"}</div>
                        <div style={{height:30,borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",background:isFirst?"rgba(234,179,8,0.12)":"rgba(255,255,255,0.03)",border:`1px solid ${isFirst?"rgba(234,179,8,0.35)":"transparent"}`,color:finalVal!==null?(finalVal>=0?"#fde047":"#f87171"):"rgba(255,255,255,0.15)",fontSize:10,fontWeight:700}}>
                          {isFirst&&<span style={{fontSize:7,lineHeight:1}}>👑</span>}
                          {finalVal!==null?fmt(finalVal):"—"}
                        </div>
                      </div>
                    );
                  })}
                </div>
                {hasError&&(
                  <div style={{background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.3)",borderTop:"none",borderRadius:"0 0 8px 8px",padding:"4px 8px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                    <span style={{color:"#fca5a5",fontSize:9}}>合計 {scoreSum.toLocaleString()}点（期待値 {expectedSum.toLocaleString()}点）</span>
                    <span className="ep" style={{color:"#f87171",fontSize:10,fontWeight:700}}>{diff>0?`+${diff.toLocaleString()}`:diff.toLocaleString()}点</span>
                  </div>
                )}
              </div>
            );
          })}

          {/* 合計 */}
          <div style={{borderTop:"1px solid rgba(139,92,246,0.3)",margin:"8px 0"}}/>
          <div style={{display:"grid",gridTemplateColumns:`20px repeat(${numPlayers},1fr)`,gap:4,marginBottom:14}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{color:"rgba(255,255,255,0.22)",fontSize:9}}>計</span></div>
            {pRange.map(pi=>{
              const total=totals[pi];
              const rank=finalRanks?finalRanks[pi]:null;
              return (
                <div key={pi} style={{borderRadius:10,padding:"10px 4px",textAlign:"center",background:rank===0?"linear-gradient(135deg,rgba(234,179,8,0.22),rgba(234,179,8,0.07))":rank===1?"rgba(148,163,184,0.1)":rank===2?"rgba(180,120,90,0.1)":"rgba(255,255,255,0.05)",border:rank===0?"1px solid rgba(234,179,8,0.45)":"1px solid rgba(255,255,255,0.07)"}}>
                  <div style={{fontSize:18,marginBottom:2}}>{rank!==null?RANK_EMOJI[rank]:"—"}</div>
                  <div style={{fontSize:15,fontWeight:900,color:total===null?"rgba(255,255,255,0.2)":total>=0?"#fde047":"#f87171"}}>{total!==null?fmt(total):"—"}</div>
                  <div style={{color:"rgba(255,255,255,0.3)",fontSize:8,marginTop:2}}>最終点合計</div>
                </div>
              );
            })}
          </div>

          <button onClick={saveSession} style={{width:"100%",padding:"13px",borderRadius:12,border:"none",background:"linear-gradient(135deg,#7c3aed,#4f46e5)",color:"#fff",fontSize:15,fontWeight:900,marginBottom:20,boxShadow:"0 4px 20px rgba(124,58,237,0.4)"}}>
            📁 この半荘を記録する
          </button>
        </div>
      )}

      {/* ── 履歴タブ ── */}
      {tab==="history" && (
        <div style={{padding:"12px 10px 0"}} className="fade-in">
          {sessions.length===0
            ? <div style={{textAlign:"center",color:"rgba(255,255,255,0.3)",marginTop:60,fontSize:14}}>まだ記録がありません<br/><span style={{fontSize:12}}>半荘終了後に「記録する」を押してください</span></div>
            : sessions.map(session=>{
              const n=session.numPlayers||3;
              const sPC=PC.slice(0,n);
              return (
                <div key={session.id} style={{marginBottom:12,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:14,overflow:"hidden"}}>
                  <div style={{padding:"10px 12px",background:"rgba(255,255,255,0.04)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div>
                      <div style={{fontSize:12,fontWeight:700}}>{formatDate(session.date)}</div>
                      <div style={{fontSize:10,color:"rgba(255,255,255,0.4)",marginTop:2}}>{n}人打ち・{session.rounds.length}局</div>
                    </div>
                    <button onClick={()=>deleteSession(session.id)} style={{background:"rgba(239,68,68,0.15)",border:"1px solid rgba(239,68,68,0.3)",color:"#fca5a5",borderRadius:20,padding:"4px 10px",fontSize:11}}>削除</button>
                  </div>
                  <div style={{padding:"10px 12px"}}>
                    <div style={{display:"grid",gridTemplateColumns:`repeat(${n},1fr)`,gap:6,marginBottom:10}}>
                      {session.players.map((name,pi)=>{
                        const rank=session.ranks[pi];
                        return (
                          <div key={pi} style={{background:rank===0?"rgba(234,179,8,0.1)":"rgba(255,255,255,0.04)",border:`1px solid ${rank===0?"rgba(234,179,8,0.35)":sPC[pi].border+"44"}`,borderRadius:10,padding:"8px 4px",textAlign:"center"}}>
                            <div style={{fontSize:15,marginBottom:2}}>{RANK_EMOJI[rank]}</div>
                            <div style={{fontSize:9,color:sPC[pi].accent,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{name}</div>
                            <div style={{fontSize:14,fontWeight:900,color:session.totals[pi]>=0?"#fde047":"#f87171",marginTop:2}}>{fmt(session.totals[pi])}</div>
                          </div>
                        );
                      })}
                    </div>
                    <details>
                      <summary style={{color:"rgba(255,255,255,0.4)",fontSize:11,cursor:"pointer",userSelect:"none"}}>▶ 局詳細を見る</summary>
                      <div style={{marginTop:8}}>
                        <div style={{display:"grid",gridTemplateColumns:`16px repeat(${n},1fr)`,gap:3,marginBottom:4}}>
                          <div/>
                          {session.players.map((name,pi)=><div key={pi} style={{fontSize:8,color:sPC[pi].accent,textAlign:"center",fontWeight:700}}>{name}</div>)}
                        </div>
                        {session.rounds.map((r,ri)=>(
                          <div key={ri} style={{display:"grid",gridTemplateColumns:`16px repeat(${n},1fr)`,gap:3,marginBottom:3}}>
                            <div style={{color:"rgba(255,255,255,0.3)",fontSize:9,display:"flex",alignItems:"center",justifyContent:"center"}}>{ri+1}</div>
                            {Array.from({length:n},(_,pi)=>(
                              <div key={pi} style={{background:r.ranks[pi]===0?"rgba(234,179,8,0.08)":"rgba(255,255,255,0.03)",borderRadius:6,padding:"3px 2px",textAlign:"center"}}>
                                <div style={{fontSize:8,color:"rgba(255,255,255,0.4)"}}>{(r.scores[pi]/1000).toFixed(1)}k</div>
                                <div style={{fontSize:10,fontWeight:700,color:r.final[pi]>=0?"#fde047":"#f87171"}}>{fmt(r.final[pi])}</div>
                              </div>
                            ))}
                          </div>
                        ))}
                      </div>
                    </details>
                  </div>
                </div>
              );
            })
          }
        </div>
      )}

      {/* ── 成績タブ ── */}
      {tab==="stats" && (
        <div style={{padding:"12px 10px 0"}} className="fade-in">
          {sessions.length===0
            ? <div style={{textAlign:"center",color:"rgba(255,255,255,0.3)",marginTop:60,fontSize:14}}>まだ記録がありません</div>
            : <StatsView sessions={sessions}/>
          }
        </div>
      )}
    </div>
  );
}

// ── 成績ビュー ────────────────────────────────
function StatsView({sessions}) {
  const [filterMode, setFilterMode] = useState(0); // 0=全て 3=三麻 4=四麻

  const filtered = filterMode===0 ? sessions : sessions.filter(s=>(s.numPlayers||3)===filterMode);

  const allPlayers = useMemo(()=>{
    const names=new Set();
    filtered.forEach(s=>s.players.forEach(n=>names.add(n)));
    return [...names];
  },[filtered]);

  const playerStats = useMemo(()=>{
    return allPlayers.map(name=>{
      let games=0, totalScore=0, ranks=[0,0,0,0];
      filtered.forEach(s=>{
        const idx=s.players.indexOf(name);
        if(idx===-1) return;
        games++;
        totalScore+=s.totals[idx];
        ranks[s.ranks[idx]]++;
      });
      const maxRank = Math.max(...filtered.filter(s=>s.players.includes(name)).map(s=>s.numPlayers||3));
      const avgRank = games>0?(ranks.reduce((s,c,i)=>s+c*(i+1),0)/games).toFixed(2):"-";
      const rank1Rate = games>0?Math.round(ranks[0]/games*100):0;
      return {name, games, totalScore, ranks, avgRank, rank1Rate};
    }).sort((a,b)=>b.totalScore-a.totalScore);
  },[allPlayers, filtered]);

  return (
    <div>
      {/* フィルター */}
      <div style={{display:"flex",gap:6,marginBottom:12}}>
        {[[0,"全て"],[3,"三麻"],[4,"四麻"]].map(([v,label])=>(
          <button key={v} onClick={()=>setFilterMode(v)} style={{padding:"5px 14px",borderRadius:20,border:`1px solid ${filterMode===v?"rgba(139,92,246,0.6)":"rgba(255,255,255,0.15)"}`,background:filterMode===v?"rgba(139,92,246,0.25)":"transparent",color:filterMode===v?"#c084fc":"rgba(255,255,255,0.5)",fontSize:12,fontWeight:filterMode===v?700:400}}>
            {label}
          </button>
        ))}
        <span style={{marginLeft:"auto",color:"rgba(255,255,255,0.4)",fontSize:11,display:"flex",alignItems:"center"}}>{filtered.length}半荘</span>
      </div>

      {playerStats.length===0
        ? <div style={{textAlign:"center",color:"rgba(255,255,255,0.3)",marginTop:40,fontSize:13}}>該当する記録がありません</div>
        : playerStats.map((p,idx)=>(
          <div key={p.name} style={{marginBottom:10,background:"rgba(255,255,255,0.05)",border:`1px solid ${idx===0?"rgba(234,179,8,0.35)":"rgba(255,255,255,0.08)"}`,borderRadius:14,padding:"12px 14px",boxShadow:idx===0?"0 0 16px rgba(234,179,8,0.1)":"none"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:22}}>{RANK_EMOJI[idx]||"　"}</span>
                <div>
                  <div style={{fontSize:15,fontWeight:900}}>{p.name}</div>
                  <div style={{fontSize:10,color:"rgba(255,255,255,0.4)"}}>{p.games}半荘</div>
                </div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:22,fontWeight:900,color:p.totalScore>=0?"#fde047":"#f87171"}}>{fmt(p.totalScore)}</div>
                <div style={{fontSize:10,color:"rgba(255,255,255,0.4)"}}>通算点</div>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:6,marginBottom:8}}>
              {[
                {label:"平均順位", value:p.avgRank},
                {label:"1位率",    value:`${p.rank1Rate}%`},
                {label:"1位回数",  value:`${p.ranks[0]}回`},
                {label:"ラス回数", value:`${p.ranks[3]+p.ranks[2]}回`},
              ].map(({label,value})=>(
                <div key={label} style={{background:"rgba(255,255,255,0.05)",borderRadius:8,padding:"7px 4px",textAlign:"center"}}>
                  <div style={{fontSize:13,fontWeight:700,color:"#e2e8f0"}}>{value}</div>
                  <div style={{fontSize:9,color:"rgba(255,255,255,0.4)",marginTop:2}}>{label}</div>
                </div>
              ))}
            </div>
            {/* 順位バー */}
            <div style={{display:"flex",height:6,borderRadius:3,overflow:"hidden",gap:1}}>
              {[["#fde047",0],["#94a3b8",1],["#cd7c2f",2],["#ef4444",3]].map(([c,ri])=>
                p.games>0&&p.ranks[ri]>0
                  ?<div key={ri} style={{width:`${p.ranks[ri]/p.games*100}%`,background:c}}/>
                  :null
              )}
            </div>
            <div style={{display:"flex",gap:8,marginTop:4,flexWrap:"wrap"}}>
              {[["🥇",p.ranks[0],"#fde047"],["🥈",p.ranks[1],"#94a3b8"],["🥉",p.ranks[2],"#cd7c2f"],["4️⃣",p.ranks[3],"#ef4444"]].filter(([,n])=>n>0).map(([e,n,c])=>(
                <span key={e} style={{fontSize:10,color:c}}>{e}{n}回</span>
              ))}
            </div>
          </div>
        ))
      }
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
